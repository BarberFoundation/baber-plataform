  #   ports:
  #     - "8080:8080"
  #   environment:
  #     AUTHENTICATION_API_KEY: change-me
  #     DATABASE_ENABLED: "false"
  #   volumes:
  #     - baber-evolution-data:/evolution/instances

volumes:
  baber-postgres-data:
  baber-redis-data:
